<!DOCTYPE html>
<meta charset="UTF-8">
<title>管理员后台</title>
<style>
body{margin:0;background:#f6f7fb;padding:20px;font-family:Arial}
.box{background:#fff;border-radius:12px;padding:20px;margin-bottom:20px}
button{padding:8px 12px;background:#0070f3;color:white;border:none;border-radius:6px;margin-right:6px;cursor:pointer}
.del{background:#e53935}
table{width:100%;border-collapse:collapse;margin-top:10px}
td,th{padding:10px;text-align:left;border-bottom:1px solid #eee}
.used{color:red}
.unused{color:green}
.admin{color:#ffc107;font-weight:bold}
</style>
<script src="invite-code.js"></script>

<div class="box">
  <h3>邀请码管理</h3>
  <button onclick="genOne()">生成1个</button>
  <button onclick="genFive()">生成5个</button>
  <div id="inviteList"></div>
</div>

<div class="box">
  <h3>用户管理（可删除）</h3>
  <div id="userList"></div>
</div>

<div class="box">
  <h3>帖子管理（可删除）</h3>
  <div id="newsList"></div>
</div>

<script>
checkAdmin();

// 渲染邀请码
function renderInvites() {
  var invites = getInvites();
  var html = '<table><tr><th>邀请码</th><th>状态</th><th>使用者</th><th>时间</th></tr>';
  for (var i = 0; i < invites.length; i++) {
    var item = invites[i];
    var status = item.used ? '<span class="used">已使用</span>' : '<span class="unused">可用</span>';
    html += '<tr>' +
      '<td>' + item.code + '</td>' +
      '<td>' + status + '</td>' +
      '<td>' + (item.usedBy || '-') + '</td>' +
      '<td>' + (item.usedTime || '-') + '</td>' +
    '</tr>';
  }
  html += '</table>';
  document.getElementById('inviteList').innerHTML = html;
}

// 生成1个
function genOne() {
  var list = getInvites();
  list.push({ code: genInviteCode(), used: false, usedBy: '', usedTime: '' });
  saveInvites(list);
  renderInvites();
}

// 生成5个
function genFive() {
  var list = getInvites();
  for(var i=0;i<5;i++){
    list.push({ code: genInviteCode(), used: false, usedBy: '', usedTime: '' });
  }
  saveInvites(list);
  renderInvites();
}

// 渲染用户
function renderUsers() {
  var users = getUsers();
  var html = '<table><tr><th>用户名</th><th>昵称</th><th>权限</th><th>操作</th></tr>';
  for (var i = 0; i < users.length; i++) {
    var u = users[i];
    var role = u.role === 'admin' ? '<span class="admin">管理员</span>' : '用户';
    html += '<tr>' +
      '<td>' + u.username + '</td>' +
      '<td>' + u.nickname + '</td>' +
      '<td>' + role + '</td>' +
      '<td><button class="del" onclick="delUser(' + i + ')">删除用户</button></td>' +
    '</tr>';
  }
  html += '</table>';
  document.getElementById('userList').innerHTML = html;
}

// 删除用户
function delUser(index) {
  if(!confirm('确定删除此用户？')) return;
  var users = getUsers();
  users.splice(index, 1);
  saveUsers(users);
  renderUsers();
}

// 渲染帖子
function renderNews() {
  var news = getNews();
  var html = '<table><tr><th>标题</th><th>发布者</th><th>时间</th><th>操作</th></tr>';
  for (var i = 0; i < news.length; i++) {
    var item = news[i];
    html += '<tr>' +
      '<td>' + item.title + '</td>' +
      '<td>' + item.username + '</td>' +
      '<td>' + item.time + '</td>' +
      '<td><button class="del" onclick="delNews(' + i + ')">删除帖子</button></td>' +
    '</tr>';
  }
  html += '</table>';
  document.getElementById('newsList').innerHTML = html;
}

// 删除帖子
function delNews(index) {
  if(!confirm('确定删除此帖子？')) return;
  var news = getNews();
  news.splice(index, 1);
  saveNews(news);
  renderNews();
}

renderInvites();
renderUsers();
renderNews();
</script>
