<!DOCTYPE html>
<meta charset="UTF-8">
<title>登录</title>
<style>
body{margin:0;height:100vh;display:grid;place-items:center;background:#f6f7fb}
.box{width:100%;max-width:400px;background:#fff;padding:30px;border-radius:16px}
input{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:8px}
button{width:100%;padding:12px;background:#0070f3;color:white;border:none;border-radius:8px}
.link{text-align:center;margin-top:10px;cursor:pointer;color:#0070f3}
</style>
<script src="invite-code.js"></script>
<div class="box">
  <h3>登录</h3>
  <input id="user" placeholder="用户名">
  <input id="pwd" type="password" placeholder="密码">
  <button onclick="login()">登录</button>
  <div class="link" onclick="location.href='register.html'">注册账号</div>
</div>

<script>
// 强制重置管理员账号
function forceAdmin() {
  let users = []; // 直接清空旧用户

  let admin = {
    username: "aizaiyudu",
    nickname: "群主管理员",
    password: "Varsapura2027",
    status: "passed",
    role: "admin"
  };

  users.push(admin);
  localStorage.setItem('users', JSON.stringify(users));
}

// 一进页面就强制重建账号
forceAdmin();

function login() {
  const username = document.getElementById('user').value.trim();
  const password = document.getElementById('pwd').value.trim();

  const users = JSON.parse(localStorage.getItem('users'));
  const u = users.find(x => x.username === username && x.password === password);

  if (!u) {
    alert("账号或密码错误");
    return;
  }
  if (u.status !== 'passed') {
    alert("账号待审核");
    return;
  }

  localStorage.setItem('currentUser', JSON.stringify(u));
  location.href = 'index.html';
}
</script>
