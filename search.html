<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>搜索结果</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}
.container{width:95%;max-width:1000px;margin:0 auto;}
nav{background:#2c3e50;padding:15px 0;position:sticky;top:0;z-index:99;}
.nav-box{display:flex;justify-content:space-between;align-items:center;}
.logo{color:#fff;font-size:22px;font-weight:bold;}
.menu{display:flex;list-style:none;gap:30px;}
.menu a{color:#fff;text-decoration:none;font-size:16px;}

.search-bar{background:#f8f9fa;padding:15px 0;}
.search-box{max-width:700px;margin:0 auto;position:relative;}
.search-box input{width:100%;padding:12px 20px 12px 45px;border:1px solid #ddd;border-radius:30px;font-size:15px;}
.search-box .icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:18px;color:#888;}

.result-title{padding:30px 0;text-align:center;}
.result-item{background:#fff;padding:15px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05);margin-bottom:12px;}
.result-item img{max-width:100%;max-height:200px;border-radius:8px;margin:8px 0;}
.result-text{color:#333;line-height:1.6;}
.go-btn{margin-top:8px;display:inline-block;padding:6px 12px;background:#3498db;color:#fff;border-radius:6px;text-decoration:none;}
</style>
</head>
<body>

<nav>
  <div class="container nav-box">
    <div class="logo">Varsapura</div>
    <ul class="menu">
      <li>主页</li>
      <li>群聊记录</li>
    </ul>
  </div>
</nav>

<div class="search-bar">
  <div class="container">
    <div class="search-box">
      <span class="icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索...">
    </div>
  </div>
</div>

<div class="result-title">
  <div class="container"><h2>搜索结果：<span id="kw"></span></h2></div>
</div>

<div class="container" id="result"></div>

<script>
const params = new URLSearchParams(location.search);
const kw = (params.get('kw') || '').toLowerCase();
document.getElementById('kw').textContent = kw;

const pages = [
  {name:'主群', url:'chat-1.html'}
];

const res = document.getElementById('result');
if(!kw){
  res.innerHTML='<div style="text-align:center;padding:40px;">请输入关键词</div>';
}else{
  res.innerHTML='<div style="padding:20px;">正在加载搜索结果...</div>';
  setTimeout(()=>{
    res.innerHTML=`
<div class="result-item">
<div class="result-text">匹配：主群 - 含「${kw}」的图片/内容</div>
< img src="https://picsum.photos/600/300" alt="">
前往查看
</div>`;
  },500);
}

const s = document.getElementById('searchInput');
s.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const v=s.value.trim();
    if(v) location.href='search.html?kw='+encodeURIComponent(v);
  }
});
</script>
</body>
</html>
